name: Pando Dashboard Refresh

# Daily refresh of the Pando Overview tab on rodashboard.netlify.app.
# Runs on GitHub-hosted runners so it fires even when no laptop is on.
#
# Schedule is UTC. 12:05 UTC = 8:05 AM US Eastern during DST (EDT),
# and 7:05 AM during standard time (EST). Adjust if you want strict 8 AM year-round.

on:
  schedule:
    - cron: '5 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pando-dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        working-directory: scripts
        run: npx playwright install --with-deps chromium

      - name: Run Pando refresh
        env:
          PANDO_EMAIL: ${{ secrets.PANDO_EMAIL }}
          PANDO_PASSWORD: ${{ secrets.PANDO_PASSWORD }}
        run: node scripts/pando-refresh.mjs

      - name: Upload login-error screenshot (if present)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pando-login-error
          path: pando-login-error.png
          if-no-files-found: ignore

      - name: Commit and push
        run: |
          if git diff --quiet index.html; then
            echo "index.html unchanged â nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Daily Pando refresh $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Push attempt $attempt failed, retryingâ¦"
            sleep $((attempt * 5))
          done
          echo "Failed to push after 3 attempts"
          exit 1

